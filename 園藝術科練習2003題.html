<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>植物辨識隨機練習工具</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 100%; max-height: 500px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .btn-group { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-main { background: #4CAF50; color: white; }
        .btn-wrong { background: #f44336; color: white; }
        .btn-next { background: #2196F3; color: white; }
        .btn-ans { background: #ff9800; color: white; }
        #answer { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; min-height: 30px; }
        .stats { margin-top: 20px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 植物辨識隨機練習</h2>
    <input type="file" id="fileInput" webkitdirectory directory multiple>
    <p id="status">請選取包含 2003 張圖片的資料夾</p>

    <img id="displayImg" src="">
    <div id="answer"></div>

    <div class="btn-group" id="controls" style="display:none;">
        <button class="btn-ans" onclick="showAnswer()">顯示答案</button>
        <button class="btn-wrong" onclick="markWrong()">我記錯了 (加入錯題本)</button>
        <button class="btn-next" onclick="nextQuestion()">下一題</button>
    </div>

    <div class="btn-group" id="modeSelect" style="display:none; margin-top:30px;">
        <button onclick="startPractice('all')">練習全部照片</button>
        <button onclick="startPractice('wrong')" id="wrongBtn">只練習錯題 (0)</button>
    </div>

    <div class="stats" id="stats"></div>
</div>

<script>
    let allFiles = [];
    let wrongFiles = new Set();
    let currentList = [];
    let currentIndex = -1;

    const fileInput = document.getElementById('fileInput');
    const displayImg = document.getElementById('displayImg');
    const answerDiv = document.getElementById('answer');
    const status = document.getElementById('status');
    const statsDiv = document.getElementById('stats');

    fileInput.onchange = (e) => {
        allFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        if (allFiles.length > 0) {
            status.innerText = `成功載入 ${allFiles.length} 張圖片！`;
            document.getElementById('modeSelect').style.display = 'flex';
        }
    };

    function startPractice(mode) {
        if (mode === 'all') {
            currentList = [...allFiles];
        } else {
            currentList = Array.from(wrongFiles);
        }
        
        if (currentList.length === 0) return alert("目前沒有錯題喔！");
        
        currentList.sort(() => Math.random() - 0.5); // 隨機打亂
        currentIndex = 0;
        document.getElementById('controls').style.display = 'flex';
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentList.length) {
            alert("練習結束！");
            return;
        }
        const file = currentList[currentIndex];
        displayImg.src = URL.createObjectURL(file);
        displayImg.style.display = 'block';
        answerDiv.innerText = "";
        updateStats();
    }

    function showAnswer() {
        const fullTitle = currentList[currentIndex].name;
        // 移除副檔名顯示
        answerDiv.innerText = fullTitle.split('.').slice(0, -1).join('.');
    }

    function markWrong() {
        wrongFiles.add(currentList[currentIndex]);
        document.getElementById('wrongBtn').innerText = `只練習錯題 (${wrongFiles.size})`;
        nextQuestion();
    }

    function nextQuestion() {
        currentIndex++;
        showQuestion();
    }

    function updateStats() {
        statsDiv.innerText = `進度：${currentIndex + 1} / ${currentList.length} | 錯題本總數：${wrongFiles.size}`;
    }
</script>

</body>
</html>
