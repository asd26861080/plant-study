<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 2003題植物辨識衝刺</title>
<style>
    body { font-family: -apple-system, sans-serif; text-align: center; background: #f1e09a; margin: 0; padding: 15px; color: #6b3c2e; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(107, 60, 46, 0.15); }
    img { width: 100%; max-height: 40vh; object-fit: contain; border-radius: 12px; margin-bottom: 5px; background: #f4d36a; }
    #answer { font-size: 22px; font-weight: bold; color: #7e4a2f; margin: 10px 0; min-height: 1.5em; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; color: #6b3c2e; }

    /* --- 新配色方案 --- */
    .btn-ans { background: #F5B08E; grid-column: span 2; } /* 顯示答案：你選的粉橘色，區隔感強 */
    #starBtn { grid-column: span 2; background: #f7c74f; } /* 標記星號：維持暖黃 */
    .btn-prev { background: #f4d36a; }
    .btn-next { background: #d77c29; color: white; }
    #modeBtn { margin-top: 15px; width: 100%; background: #9a5a2e; color: white; }
    
    .stats { margin-top: 20px; font-size: 14px; color: #7e4a2f; border-top: 1px solid #f4d36a; padding-top: 15px; line-height: 1.6; }
    button:active { filter: brightness(0.9); transform: scale(0.98); }
</style>
</head>
<body>

<div class="container">
    <img id="displayImg" src="" style="display:none;">
    <div id="answer"></div>

    <div class="btn-group">
        <button class="btn-ans" onclick="showAnswer()">顯示答案</button>
        <button id="starBtn" onclick="toggleStar()">☆ 標記星號</button>
        <button class="btn-prev" onclick="prevQuestion()">上一題</button>
        <button class="btn-next" onclick="nextQuestion()">下一題</button>
    </div>

    <div class="stats" id="stats"></div>
    <button id="modeBtn" onclick="toggleMode()">切換模式</button>
    
    <button onclick="clearAllStars()" style="margin-top: 10px; background: #b2bec3; color: white; width: 100%; font-size: 11px; border-radius: 8px; padding: 5px; border:none; cursor:pointer; opacity: 0.6;">清空星號</button>
    <button onclick="resetProgress()" style="margin-top: 5px; background: #b2bec3; color: white; width: 100%; font-size: 11px; border-radius: 8px; padding: 5px; border:none; cursor:pointer; opacity: 0.6;">重置全庫練習進度</button>
</div>

<script>
    // 請在此處貼上你的 photoNames 數組
    const photoNames = [/* ... 你的2003張圖片清單 ... */];

    let starredFiles = JSON.parse(localStorage.getItem('plant_stars') || '[]');
    let isStarMode = false;
    let currentIndex = -1;
    let starModeIndex = 0;
    let history = JSON.parse(localStorage.getItem('plant_history') || '[]'); 

    const displayImg = document.getElementById('displayImg');
    const answerDiv = document.getElementById('answer');
    const statsDiv = document.getElementById('stats');
    const modeBtn = document.getElementById('modeBtn');
    const starBtn = document.getElementById('starBtn');

    window.onload = () => {
        // 進度恢復邏輯
        if (history.length > 0) {
            if (confirm(`偵測到上次練習到第 ${history.length} 張，要繼續嗎？`)) {
                currentIndex = history[history.length - 1];
                showPhoto(photoNames[currentIndex]);
            } else {
                nextQuestion();
            }
        } else {
            nextQuestion();
        }
    };

    function nextQuestion() {
        if (!isStarMode) {
            currentIndex = Math.floor(Math.random() * photoNames.length);
            history.push(currentIndex);
            // 儲存進度到手機
            localStorage.setItem('plant_history', JSON.stringify(history));
            showPhoto(photoNames[currentIndex]);
        } else {
            if (starredFiles.length === 0) {
                alert("標記清單已空！");
                toggleMode();
                return;
            }
            starModeIndex++;
            currentIndex = Math.floor(Math.random() * starredFiles.length);
            showPhoto(starredFiles[currentIndex]);
        }
    }

    function prevQuestion() {
        if (isStarMode || history.length <= 1) return;
        history.pop();
        currentIndex = history[history.length - 1];
        localStorage.setItem('plant_history', JSON.stringify(history));
        showPhoto(photoNames[currentIndex]);
    }

    function showPhoto(photoName) {
        let name = typeof photoName === 'string' ? photoName : photoNames[currentIndex];
        displayImg.src = encodeURIComponent(name);
        displayImg.style.display = 'block';
        answerDiv.innerText = ""; 
        updateUI();
    }

    function showAnswer() {
        let list = isStarMode ? starredFiles : photoNames;
        answerDiv.innerText = list[currentIndex].split(' (')[0].split('.')[0];
    }

    function toggleStar() {
        let list = isStarMode ? starredFiles : photoNames;
        const photo = list[currentIndex];
        const starIdx = starredFiles.indexOf(photo);
        if (starIdx > -1) {
            starredFiles.splice(starIdx, 1);
            if (isStarMode) {
                localStorage.setItem('plant_stars', JSON.stringify(starredFiles));
                nextQuestion();
                return;
            }
        } else {
            starredFiles.push(photo);
        }
        localStorage.setItem('plant_stars', JSON.stringify(starredFiles));
        updateUI();
    }

    function toggleMode() {
        if (starredFiles.length === 0 && !isStarMode) {
            alert("還沒有星號喔！");
            return;
        }
        isStarMode = !isStarMode;
        starModeIndex = 0;
        nextQuestion();
    }

    function updateUI() {
        let list = isStarMode ? starredFiles : photoNames;
        const isStarred = starredFiles.includes(list[currentIndex]);

        starBtn.innerText = isStarred ? "★ 已標記 (點擊取消)" : "☆ 標記星號";
        starBtn.style.background = isStarred ? "#b86f2d" : "#f7c74f";
        starBtn.style.color = isStarred ? "white" : "#6b3c2e";

        modeBtn.innerText = isStarMode ? "← 回到全庫練習" : `進入重點模式 (${starredFiles.length})`;
        modeBtn.style.background = isStarMode ? "#6b3c2e" : "#9a5a2e";

        let progress = isStarMode 
            ? `重點複習進度：${starModeIndex} / ${starredFiles.length}` 
            : `全庫練習進度：已看 ${history.length} / ${photoNames.length}`;
        
        statsDiv.innerHTML = `<b>${progress}</b><br>標記星號：${starredFiles.length} | 模式：${isStarMode ? '重點複習' : '全庫隨機'}`;
    }

    function resetProgress() {
        if (confirm("確定要重置已看過的圖片紀錄嗎？(不影響星號)")) {
            history = [];
            localStorage.removeItem('plant_history');
            nextQuestion();
        }
    }

    function clearAllStars() {
        if (confirm("確定清空星號嗎？")) {
            starredFiles = [];
            localStorage.setItem('plant_stars', '[]');
            if (isStarMode) toggleMode();
            updateUI();
        }
    }
</script>
</body>
</html>
